<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up Form</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="form-wrapper">
      <h1>Create Account</h1>
      <form id="signupForm">
        <div class="field">
          <label>Username</label>
          <input type="text" id="user" placeholder="Enter your username" />
        </div>

        <div class="field">
          <label>Email</label>
          <input type="email" id="mail" placeholder="Enter your email" />
          <span class="error" id="mailErr"></span>
        </div>

        <div class="field">
          <label>Password</label>
          <input type="password" id="pass" placeholder="Enter password" />
          <span class="error" id="passErr"></span>
        </div>
                                          
        <div class="field">
          <label>Confirm Password</label>
          <input type="password" id="confirm" placeholder="Re-enter password" />
          <span class="error" id="confirmErr"></span>
        </div>

        <button type="submit">Sign Up</button>
      </form>
    </div>
    <script src="script.js"></script>
  </body>
</html>
